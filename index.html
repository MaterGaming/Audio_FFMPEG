<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333);
            padding: 16px;
        }
        
        /* Кнопка выбора файла - САМАЯ ГЛАВНАЯ */
        .file-select-btn {
            width: 100%;
            padding: 20px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        
        .file-select-btn input {
            display: none;
        }
        
        /* Информация о файле */
        .file-info {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
            display: none;
        }
        
        .file-info.active {
            display: block;
        }
        
        .file-name {
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .file-size {
            color: var(--tg-theme-hint-color, #666);
            font-size: 14px;
        }
        
        /* Плеер */
        #waveform {
            width: 100%;
            height: 120px;
            margin: 20px 0;
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 8px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, white);
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }
        
        .btn.secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #333);
        }
        
        /* Эффекты */
        .effect {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
        }
        
        .effect input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        
        /* Статус */
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="margin-bottom: 20px;">🎵 Аудиоредактор</h1>
        
        <!-- КНОПКА ВЫБОРА ФАЙЛА - ТЫКАЙ СЮДА! -->
        <label class="file-select-btn">
            📁 Выбрать аудиофайл
            <input type="file" id="fileInput" accept="audio/*">
        </label>
        
        <!-- Информация о файле -->
        <div id="fileInfo" class="file-info">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>
        
        <!-- Волна (появится после загрузки) -->
        <div id="waveform"></div>
        
        <!-- Кнопки управления (появятся после загрузки) -->
        <div id="controls" class="controls" style="display: none;">
            <button class="btn" id="playBtn">▶️ Play</button>
            <button class="btn" id="pauseBtn">⏸️ Pause</button>
            <button class="btn secondary" id="stopBtn">⏹️ Stop</button>
        </div>
        
        <!-- Эффекты (появятся после загрузки) -->
        <div id="effects" style="display: none;">
            <div class="effect">
                <h3>🔊 Громкость</h3>
                <input type="range" id="volume" min="0" max="200" value="100">
                <div id="volumeValue">100%</div>
            </div>
            
            <div class="effect">
                <h3>⚡ Скорость</h3>
                <input type="range" id="speed" min="50" max="200" value="100">
                <div id="speedValue">1.0x</div>
            </div>
            
            <div class="effect">
                <h3>✂️ Обрезка</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" id="setStart">Начало</button>
                    <button class="btn" id="setEnd">Конец</button>
                </div>
                <div style="margin-top: 10px;">
                    <span id="cutStart">0:00</span> - <span id="cutEnd">0:00</span>
                </div>
                <button class="btn" id="applyCut" style="margin-top: 10px;">Применить обрезку</button>
            </div>
            
            <div class="effect">
                <h3>💾 Экспорт</h3>
                <select id="format" style="width: 100%; padding: 10px; margin: 10px 0;">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                    <option value="ogg">OGG</option>
                </select>
                <button class="btn" id="exportBtn">Скачать</button>
            </div>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let wavesurfer;
        let audioFile = null;
        let cutStart = 0;
        let cutEnd = 0;
        
        // Ждем загрузку страницы
        document.addEventListener('DOMContentLoaded', () => {
            // Инициализируем WaveSurfer
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#2481cc',
                progressColor: '#4a9eff',
                cursorColor: '#ff4444',
                barWidth: 2,
                height: 120,
                responsive: true
            });
            
            // Обработчик выбора файла - ЭТО РАБОТАЕТ!
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    handleFileSelect(file);
                }
            });
            
            // Обработчики кнопок
            document.getElementById('playBtn').addEventListener('click', () => wavesurfer.play());
            document.getElementById('pauseBtn').addEventListener('click', () => wavesurfer.pause());
            document.getElementById('stopBtn').addEventListener('click', () => {
                wavesurfer.stop();
                wavesurfer.seekTo(0);
            });
            
            // Громкость
            document.getElementById('volume').addEventListener('input', (e) => {
                const val = e.target.value / 100;
                wavesurfer.setVolume(val);
                document.getElementById('volumeValue').textContent = e.target.value + '%';
            });
            
            // Скорость
            document.getElementById('speed').addEventListener('input', (e) => {
                const val = e.target.value / 100;
                wavesurfer.setPlaybackRate(val);
                document.getElementById('speedValue').textContent = val.toFixed(1) + 'x';
            });
            
            // Обрезка
            document.getElementById('setStart').addEventListener('click', () => {
                cutStart = wavesurfer.getCurrentTime();
                document.getElementById('cutStart').textContent = formatTime(cutStart);
                showStatus('Начало обрезки: ' + formatTime(cutStart), 'success');
            });
            
            document.getElementById('setEnd').addEventListener('click', () => {
                cutEnd = wavesurfer.getCurrentTime();
                document.getElementById('cutEnd').textContent = formatTime(cutEnd);
                showStatus('Конец обрезки: ' + formatTime(cutEnd), 'success');
            });
            
            document.getElementById('applyCut').addEventListener('click', async () => {
                if (cutStart >= cutEnd) {
                    showStatus('Ошибка: начало должно быть меньше конца', 'error');
                    return;
                }
                
                try {
                    const buffer = await wavesurfer.backend.getAudioBuffer();
                    const sampleRate = buffer.sampleRate;
                    const startSample = Math.floor(cutStart * sampleRate);
                    const endSample = Math.floor(cutEnd * sampleRate);
                    
                    // Создаем новый буфер
                    const newBuffer = new AudioContext().createBuffer(
                        buffer.numberOfChannels,
                        endSample - startSample,
                        sampleRate
                    );
                    
                    for (let i = 0; i < buffer.numberOfChannels; i++) {
                        const channelData = buffer.getChannelData(i);
                        newBuffer.copyToChannel(channelData.slice(startSample, endSample), i);
                    }
                    
                    // Конвертируем в WAV
                    const wav = bufferToWav(newBuffer);
                    const blob = new Blob([wav], { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    
                    wavesurfer.load(url);
                    showStatus('Аудио обрезано!', 'success');
                } catch (err) {
                    showStatus('Ошибка: ' + err.message, 'error');
                }
            });
            
            // Экспорт
            document.getElementById('exportBtn').addEventListener('click', async () => {
                const format = document.getElementById('format').value;
                const buffer = await wavesurfer.backend.getAudioBuffer();
                
                const wav = bufferToWav(buffer);
                const blob = new Blob([wav], { type: `audio/${format}` });
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audio.${format}`;
                a.click();
                URL.revokeObjectURL(url);
                
                showStatus('Файл скачан!', 'success');
            });
        });
        
        // Функция обработки файла
        function handleFileSelect(file) {
            audioFile = file;
            
            // Показываем информацию о файле
            document.getElementById('fileInfo').classList.add('active');
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatBytes(file.size);
            
            // Показываем элементы управления
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('effects').style.display = 'block';
            
            // Загружаем в плеер
            const url = URL.createObjectURL(file);
            wavesurfer.load(url);
            
            // Обновляем время
            wavesurfer.on('ready', () => {
                document.getElementById('duration').textContent = formatTime(wavesurfer.getDuration());
            });
            
            wavesurfer.on('audioprocess', () => {
                document.getElementById('currentTime').textContent = formatTime(wavesurfer.getCurrentTime());
            });
            
            showStatus('Файл загружен: ' + file.name, 'success');
        }
        
        // Вспомогательные функции
        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function bufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1;
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            const dataLength = buffer.length * blockAlign;
            const bufferLength = 44 + dataLength;
            
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(view, 8, 'WAVE');
            
            // fmt subchunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            
            // data subchunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // Write audio data
            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    let sample = buffer.getChannelData(channel)[i];
                    sample = Math.max(-1, Math.min(1, sample));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
            }
            
            return arrayBuffer;
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status show ' + type;
            setTimeout(() => {
                status.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
