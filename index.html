<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333);
            padding: 16px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--tg-theme-button-color, #2481cc);
        }
        
        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            padding: 10px;
            border-radius: 12px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--tg-theme-text-color, #333);
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Секция выбора аудио */
        .audio-selector {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .file-input-area {
            border: 2px dashed var(--tg-theme-button-color, #2481cc);
            border-radius: 12px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .file-input-area:hover {
            background: var(--tg-theme-bg-color, #f0f0f0);
        }
        
        .file-input-area input {
            display: none;
        }
        
        .file-input-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .file-input-icon {
            font-size: 48px;
        }
        
        .file-input-text {
            font-size: 18px;
            color: var(--tg-theme-button-color, #2481cc);
        }
        
        .file-input-hint {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .audio-list {
            margin-top: 20px;
        }
        
        .audio-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--tg-theme-bg-color, #f8f9fa);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .audio-item:hover {
            transform: translateX(5px);
        }
        
        .audio-item.selected {
            border: 2px solid var(--tg-theme-button-color, #2481cc);
        }
        
        .audio-icon {
            font-size: 24px;
            margin-right: 12px;
        }
        
        .audio-info {
            flex: 1;
        }
        
        .audio-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .audio-meta {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .audio-duration {
            margin-left: 12px;
            font-family: monospace;
        }
        
        .load-audio-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .load-audio-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Секция редактора */
        .audio-player {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        #waveform {
            width: 100%;
            height: 120px;
            margin-bottom: 12px;
            background: var(--tg-theme-bg-color, #f0f0f0);
            border-radius: 8px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .control-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .control-btn:hover {
            opacity: 0.9;
        }
        
        .control-btn.secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #333);
        }
        
        .effect-panel {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .effect-item {
            background: var(--tg-theme-bg-color, #f8f9fa);
            border-radius: 8px;
            padding: 12px;
        }
        
        .effect-item h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .effect-item input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }
        
        .effect-value {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
            margin: 8px 0;
        }
        
        .pitch-presets {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        
        .pitch-preset-btn {
            flex: 1;
            min-width: 40px;
            padding: 5px;
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .export-options {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .format-selector {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .format-btn {
            flex: 1;
            min-width: 60px;
            padding: 8px;
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            background: transparent;
            color: var(--tg-theme-text-color, #333);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .format-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
        }
        
        .export-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Editor</h1>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="select">📁 Выбрать аудио</button>
            <button class="tab-btn" data-tab="edit">🎚️ Редактор</button>
        </div>
        
        <!-- Вкладка выбора аудио -->
        <div class="tab-content active" id="tab-select">
            <div class="audio-selector">
                <h2>Выберите аудиофайл</h2>
                
                <!-- Область загрузки файла -->
                <div class="file-input-area" id="file-input-area">
                    <input type="file" id="audio-file" accept="audio/*">
                    <label for="audio-file" class="file-input-label">
                        <span class="file-input-icon">📁</span>
                        <span class="file-input-text">Нажмите для выбора файла</span>
                        <span class="file-input-hint">или перетащите файл сюда</span>
                    </label>
                </div>
                
                <!-- Демо-аудио -->
                <div class="audio-list">
                    <h3>Демо-треки</h3>
                    <div class="audio-item" data-src="https://www2.cs.uic.edu/~i101/SoundFiles/CantinaBand60.wav" data-name="Cantina Band">
                        <span class="audio-icon">🎵</span>
                        <div class="audio-info">
                            <div class="audio-name">Cantina Band</div>
                            <div class="audio-meta">WAV • 60 сек</div>
                        </div>
                        <span class="audio-duration">1:00</span>
                    </div>
                    
                    <div class="audio-item" data-src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" data-name="Star Wars Theme">
                        <span class="audio-icon">🎵</span>
                        <div class="audio-info">
                            <div class="audio-name">Star Wars Theme</div>
                            <div class="audio-meta">WAV • 60 сек</div>
                        </div>
                        <span class="audio-duration">1:00</span>
                    </div>
                    
                    <div class="audio-item" data-src="https://www2.cs.uic.edu/~i101/SoundFiles/ImperialMarch60.wav" data-name="Imperial March">
                        <span class="audio-icon">🎵</span>
                        <div class="audio-info">
                            <div class="audio-name">Imperial March</div>
                            <div class="audio-meta">WAV • 60 сек</div>
                        </div>
                        <span class="audio-duration">1:00</span>
                    </div>
                </div>
                
                <button class="load-audio-btn" id="load-audio-btn" disabled>📥 Загрузить в редактор</button>
            </div>
        </div>
        
        <!-- Вкладка редактора -->
        <div class="tab-content" id="tab-edit">
            <div class="audio-player">
                <div id="waveform"></div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="controls">
                    <button class="control-btn" id="play-btn">▶️ Play</button>
                    <button class="control-btn" id="pause-btn">⏸️ Pause</button>
                    <button class="control-btn" id="stop-btn">⏹️ Stop</button>
                    <button class="control-btn secondary" id="cut-btn">✂️ Обрезать</button>
                    <button class="control-btn secondary" id="reset-btn">🔄 Сбросить</button>
                </div>
            </div>
            
            <div class="effect-panel">
                <div class="effect-item">
                    <h3>Громкость</h3>
                    <input type="range" id="volume" min="0" max="2" step="0.1" value="1">
                    <div class="effect-value" id="volume-value">100%</div>
                </div>
                
                <div class="effect-item">
                    <h3>Скорость</h3>
                    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
                    <div class="effect-value" id="speed-value">1.0x</div>
                </div>
                
                <div class="effect-item">
                    <h3>Высота тона</h3>
                    <input type="range" id="pitch" min="-12" max="12" step="1" value="0">
                    <div class="effect-value" id="pitch-value">0 полутонов</div>
                    <div class="pitch-presets">
                        <button class="pitch-preset-btn" data-pitch="-12">-1 окт</button>
                        <button class="pitch-preset-btn" data-pitch="-5">-5</button>
                        <button class="pitch-preset-btn" data-pitch="-2">-2</button>
                        <button class="pitch-preset-btn" data-pitch="0">0</button>
                        <button class="pitch-preset-btn" data-pitch="2">+2</button>
                        <button class="pitch-preset-btn" data-pitch="5">+5</button>
                        <button class="pitch-preset-btn" data-pitch="12">+1 окт</button>
                    </div>
                </div>
            </div>
            
            <div class="export-options">
                <h3>Формат экспорта</h3>
                <div class="format-selector">
                    <button class="format-btn active" data-format="mp3">MP3</button>
                    <button class="format-btn" data-format="wav">WAV</button>
                    <button class="format-btn" data-format="ogg">OGG</button>
                    <button class="format-btn" data-format="m4a">M4A</button>
                </div>
                
                <h3>Качество</h3>
                <select id="quality" style="width:100%; padding:10px; margin:10px 0;">
                    <option value="64">64 kbps (Низкое)</option>
                    <option value="128" selected>128 kbps (Среднее)</option>
                    <option value="192">192 kbps (Хорошее)</option>
                    <option value="320">320 kbps (Высокое)</option>
                </select>
            </div>
            
            <button class="export-btn" id="export-btn">💾 Экспортировать аудио</button>
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let wavesurfer;
        let audioContext;
        let audioBuffer;
        let originalBuffer;
        let selectedAudioSrc = null;
        let selectedAudioName = null;
        
        // Инициализация WaveSurfer
        function initWaveform() {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: tg.themeParams.button_color || '#2481cc',
                progressColor: tg.themeParams.button_text_color || '#4a9eff',
                cursorColor: '#ff4444',
                barWidth: 2,
                barRadius: 3,
                responsive: true,
                height: 120
            });
            
            wavesurfer.on('ready', function() {
                updateTime();
                
                // Получаем аудиоданные для обработки
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                wavesurfer.backend.getAudioBuffer().then(buffer => {
                    originalBuffer = buffer;
                    audioBuffer = buffer;
                    showStatus('Аудио загружено!', 'success');
                });
            });
            
            wavesurfer.on('audioprocess', updateTime);
            wavesurfer.on('seek', updateTime);
        }
        
        // Переключение вкладок
        function setupTabs() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;
                    
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    
                    btn.classList.add('active');
                    document.getElementById(`tab-${tabId}`).classList.add('active');
                });
            });
        }
        
        // Настройка выбора аудио
        function setupAudioSelection() {
            const fileInput = document.getElementById('audio-file');
            const fileArea = document.getElementById('file-input-area');
            const audioItems = document.querySelectorAll('.audio-item');
            const loadBtn = document.getElementById('load-audio-btn');
            
            // Обработка выбора файла
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    selectedAudioSrc = url;
                    selectedAudioName = file.name;
                    loadBtn.disabled = false;
                    
                    // Визуальное выделение
                    audioItems.forEach(item => item.classList.remove('selected'));
                    showStatus(`Выбран файл: ${file.name}`, 'info');
                }
            });
            
            // Перетаскивание файла
            fileArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileArea.style.background = 'var(--tg-theme-bg-color, #f0f0f0)';
            });
            
            fileArea.addEventListener('dragleave', () => {
                fileArea.style.background = '';
            });
            
            fileArea.addEventListener('drop', (e) => {
                e.preventDefault();
                fileArea.style.background = '';
                
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('audio/')) {
                    const url = URL.createObjectURL(file);
                    selectedAudioSrc = url;
                    selectedAudioName = file.name;
                    loadBtn.disabled = false;
                    showStatus(`Выбран файл: ${file.name}`, 'info');
                } else {
                    showStatus('Пожалуйста, выберите аудиофайл', 'error');
                }
            });
            
            // Выбор демо-трека
            audioItems.forEach(item => {
                item.addEventListener('click', () => {
                    audioItems.forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    
                    selectedAudioSrc = item.dataset.src;
                    selectedAudioName = item.dataset.name;
                    loadBtn.disabled = false;
                    
                    showStatus(`Выбран трек: ${item.dataset.name}`, 'info');
                });
            });
            
            // Загрузка в редактор
            loadBtn.addEventListener('click', () => {
                if (selectedAudioSrc) {
                    // Переключаемся на вкладку редактора
                    document.querySelector('[data-tab="edit"]').click();
                    
                    // Загружаем аудио
                    wavesurfer.load(selectedAudioSrc);
                    
                    showStatus('Загрузка аудио...', 'info');
                }
            });
        }
        
        // Обновление времени
        function updateTime() {
            const current = wavesurfer.getCurrentTime();
            const duration = wavesurfer.getDuration();
            document.getElementById('current-time').textContent = formatTime(current);
            document.getElementById('duration').textContent = formatTime(duration);
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Применение эффектов
        function applyEffects() {
            if (!audioBuffer) return;
            
            const volume = parseFloat(document.getElementById('volume').value);
            const speed = parseFloat(document.getElementById('speed').value);
            
            // Применяем громкость
            wavesurfer.setVolume(volume);
            
            // Применяем скорость
            wavesurfer.setPlaybackRate(speed);
            
            // Обновляем отображение значений
            document.getElementById('volume-value').textContent = Math.round(volume * 100) + '%';
            document.getElementById('speed-value').textContent = speed.toFixed(1) + 'x';
            
            const pitch = parseInt(document.getElementById('pitch').value);
            document.getElementById('pitch-value').textContent = pitch + ' полутонов';
            
            // Здесь можно добавить обработку тона
            if (pitch !== 0 && audioBuffer) {
                applyPitchShift(pitch);
            }
        }
        
        // Функция изменения тона (упрощенная)
        function applyPitchShift(semitones) {
            // В реальном проекте здесь была бы библиотека для обработки тона
            // Для демо просто показываем уведомление
            console.log('Pitch shift:', semitones, 'semitones');
        }
        
        // Обрезка аудио
        function cutAudio() {
            if (!audioBuffer) return;
            
            const currentTime = wavesurfer.getCurrentTime();
            const duration = wavesurfer.getDuration();
            
            // Простая обрезка - удаляем первую половину
            // В реальном проекте нужно сделать интерфейс для выбора области
            const cutPosition = duration / 2;
            
            if (currentTime < cutPosition) {
                // Обрезаем до текущей позиции
                const startSample = Math.floor(currentTime * audioBuffer.sampleRate);
                const newBuffer = audioContext.createBuffer(
                    audioBuffer.numberOfChannels,
                    audioBuffer.length - startSample,
                    audioBuffer.sampleRate
                );
                
                for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
                    const channelData = audioBuffer.getChannelData(channel);
                    newBuffer.copyToChannel(channelData.slice(startSample), channel);
                }
                
                audioBuffer = newBuffer;
                updateWaveform();
                showStatus('Аудио обрезано', 'success');
            }
        }
        
        // Обновление波形
        function updateWaveform() {
            const wavBuffer = bufferToWav(audioBuffer);
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            wavesurfer.load(url);
        }
        
        // Конвертация Buffer в WAV
        function bufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            let bytesPerSample = bitDepth / 8;
            let blockAlign = numChannels * bytesPerSample;
            
            let dataLength = buffer.length * blockAlign;
            let bufferLength = 44 + dataLength;
            
            let arrayBuffer = new ArrayBuffer(bufferLength);
            let view = new DataView(arrayBuffer);
            
            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(view, 8, 'WAVE');
            
            // fmt subchunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            
            // data subchunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // Write audio data
            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    let sample = buffer.getChannelData(channel)[i];
                    sample = Math.max(-1, Math.min(1, sample));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
            }
            
            return arrayBuffer;
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        // Экспорт аудио
        function exportAudio() {
            const format = document.querySelector('.format-btn.active').dataset.format;
            const quality = document.getElementById('quality').value;
            
            if (!audioBuffer) {
                showStatus('Нет аудио для экспорта', 'error');
                return;
            }
            
            showStatus('Подготовка к экспорту...', 'info');
            
            try {
                const wavBuffer = bufferToWav(audioBuffer);
                let mimeType = 'audio/wav';
                
                switch(format) {
                    case 'mp3': mimeType = 'audio/mpeg'; break;
                    case 'wav': mimeType = 'audio/wav'; break;
                    case 'ogg': mimeType = 'audio/ogg'; break;
                    case 'm4a': mimeType = 'audio/mp4'; break;
                }
                
                const blob = new Blob([wavBuffer], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audio_edited.${format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showStatus('Готово! Файл сохранен', 'success');
                
                tg.sendData(JSON.stringify({
                    action: 'processed',
                    format: format,
                    quality: quality
                }));
            } catch (error) {
                showStatus('Ошибка при экспорте', 'error');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initWaveform();
            setupTabs();
            setupAudioSelection();
            
            // Обработчики кнопок редактора
            document.getElementById('play-btn').addEventListener('click', () => wavesurfer.play());
            document.getElementById('pause-btn').addEventListener('click', () => wavesurfer.pause());
            document.getElementById('stop-btn').addEventListener('click', () => wavesurfer.stop());
            document.getElementById('cut-btn').addEventListener('click', cutAudio);
            
            document.getElementById('reset-btn').addEventListener('click', () => {
                if (originalBuffer) {
                    audioBuffer = originalBuffer;
                    updateWaveform();
                    document.getElementById('volume').value = 1;
                    document.getElementById('speed').value = 1;
                    document.getElementById('pitch').value = 0;
                    applyEffects();
                    showStatus('Сброшено к оригиналу', 'success');
                }
            });
            
            // Эффекты
            document.getElementById('volume').addEventListener('input', applyEffects);
            document.getElementById('speed').addEventListener('input', applyEffects);
            document.getElementById('pitch').addEventListener('input', applyEffects);
            
            // Пресеты тона
            document.querySelectorAll('.pitch-preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const pitch = parseInt(btn.dataset.pitch);
                    document.getElementById('pitch').value = pitch;
                    applyEffects();
                });
            });
            
            // Форматы
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            // Экспорт
            document.getElementById('export-btn').addEventListener('click', exportAudio);
        });
    </script>
</body>
</html>
