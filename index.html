<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audio Editor</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7"></script>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.file{
background:#2481cc;
color:white;
padding:20px;
border-radius:10px;
display:block;
text-align:center;
cursor:pointer;
}

.file input{
display:none;
}

#waveform{
height:120px;
background:white;
border-radius:10px;
margin-top:20px;
}

.controls{
display:none;
margin-top:10px;
gap:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2481cc;
color:white;
cursor:pointer;
}

.effect{
display:none;
background:white;
margin-top:15px;
padding:15px;
border-radius:10px;
}

input[type=range]{
width:100%;
}

.range-label{
display:flex;
justify-content:space-between;
font-size:14px;
margin-top:5px;
}

</style>
</head>

<body>

<h2>🎵 Аудиоредактор</h2>

<label class="file">
📁 Выбрать аудио
<input type="file" id="fileInput" accept="audio/*">
</label>

<div id="waveform"></div>

<div class="controls" id="controls">
<button id="play">▶️</button>
<button id="pause">⏸</button>
<button id="stop">⏹</button>
</div>

<div class="effect">

<h3>🔊 Громкость</h3>

<input type="range" id="volume" min="25" max="300" value="100">

<div id="volumeText">100%</div>

</div>

<div class="effect">

<h3>⚡ Скорость</h3>

<input type="range" id="speed" min="50" max="200" value="100">

<div id="speedText">1.0x</div>

</div>

<div class="effect">

<h3>✂️ Обрезка</h3>

Начало
<input type="range" id="cutStart" min="0" max="100" value="0">

Конец
<input type="range" id="cutEnd" min="0" max="100" value="100">

<div class="range-label">
<span id="cutStartTime">0:00</span>
<span id="cutEndTime">0:00</span>
</div>

<button id="cutBtn">Применить</button>

</div>

<div class="effect">

<h3>💾 Экспорт</h3>

<button id="exportBtn">Скачать WAV</button>

</div>

<script>

const tg = window.Telegram.WebApp
tg.ready()
tg.expand()

let wavesurfer
let audioBuffer
let originalBuffer

let volumePercent = 100
let startPercent = 0
let endPercent = 100

const ctx = new AudioContext()

wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#2481cc",
progressColor:"#4a9eff",
height:120
})

function formatTime(s){

if(!s) return "0:00"

const m = Math.floor(s/60)
const sec = Math.floor(s%60)

return m + ":" + sec.toString().padStart(2,"0")

}

document.getElementById("fileInput").addEventListener("change",async e=>{

const file = e.target.files[0]

const arrayBuffer = await file.arrayBuffer()

audioBuffer = await ctx.decodeAudioData(arrayBuffer)

originalBuffer = audioBuffer

wavesurfer.load(URL.createObjectURL(file))

document.getElementById("controls").style.display="flex"

document.querySelectorAll(".effect").forEach(e=>e.style.display="block")

updateCutTimes()

})

document.getElementById("play").onclick = async ()=>{

if(ctx.state==="suspended") await ctx.resume()

wavesurfer.play()

}

document.getElementById("pause").onclick=()=>wavesurfer.pause()

document.getElementById("stop").onclick=()=>{

wavesurfer.stop()
wavesurfer.seekTo(0)

}

document.getElementById("volume").addEventListener("input",e=>{

volumePercent = parseFloat(e.target.value)

document.getElementById("volumeText").innerText = volumePercent+"%"

applyVolume()

})

function applyVolume(){

const gain = volumePercent/100

const newBuffer = ctx.createBuffer(
originalBuffer.numberOfChannels,
originalBuffer.length,
originalBuffer.sampleRate
)

for(let ch=0;ch<originalBuffer.numberOfChannels;ch++){

const src = originalBuffer.getChannelData(ch)
const dst = newBuffer.getChannelData(ch)

for(let i=0;i<src.length;i++){

dst[i] = src[i]*gain

}

}

audioBuffer = newBuffer

const wav = bufferToWav(audioBuffer)

wavesurfer.load(URL.createObjectURL(new Blob([wav],{type:"audio/wav"})))

}

document.getElementById("speed").addEventListener("input",e=>{

const rate = parseFloat(e.target.value)/100

wavesurfer.setPlaybackRate(rate)

document.getElementById("speedText").innerText = rate.toFixed(2)+"x"

})

const cutStartSlider=document.getElementById("cutStart")
const cutEndSlider=document.getElementById("cutEnd")

cutStartSlider.oninput=()=>{
startPercent=parseFloat(cutStartSlider.value)
updateCutTimes()
}

cutEndSlider.oninput=()=>{
endPercent=parseFloat(cutEndSlider.value)
updateCutTimes()
}

function updateCutTimes(){

if(!audioBuffer) return

const duration = audioBuffer.duration

document.getElementById("cutStartTime").innerText=formatTime(duration*(startPercent/100))

document.getElementById("cutEndTime").innerText=formatTime(duration*(endPercent/100))

}

document.getElementById("cutBtn").onclick=()=>{

const duration=audioBuffer.duration

const start=duration*(startPercent/100)
const end=duration*(endPercent/100)

const startSample=Math.floor(start*audioBuffer.sampleRate)
const endSample=Math.floor(end*audioBuffer.sampleRate)

const newBuffer=ctx.createBuffer(
audioBuffer.numberOfChannels,
endSample-startSample,
audioBuffer.sampleRate
)

for(let ch=0;ch<audioBuffer.numberOfChannels;ch++){

const oldData=audioBuffer.getChannelData(ch)
const newData=newBuffer.getChannelData(ch)

for(let i=0;i<endSample-startSample;i++){

newData[i]=oldData[i+startSample]

}

}

audioBuffer=newBuffer
originalBuffer=newBuffer

wavesurfer.load(URL.createObjectURL(new Blob([bufferToWav(audioBuffer)],{type:"audio/wav"})))

updateCutTimes()

}

document.getElementById("exportBtn").onclick=()=>{

const wav=bufferToWav(audioBuffer)

const blob=new Blob([wav],{type:"audio/wav"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="audio.wav"
a.click()

URL.revokeObjectURL(url)

}

function bufferToWav(buffer){

const numChannels=buffer.numberOfChannels
const sampleRate=buffer.sampleRate
const samples=buffer.length*numChannels

const arrayBuffer=new ArrayBuffer(44+samples*2)
const view=new DataView(arrayBuffer)

let offset=0

function writeString(s){
for(let i=0;i<s.length;i++){
view.setUint8(offset++,s.charCodeAt(i))
}
}

writeString("RIFF")
view.setUint32(offset,36+samples*2,true);offset+=4
writeString("WAVE")
writeString("fmt ")
view.setUint32(offset,16,true);offset+=4
view.setUint16(offset,1,true);offset+=2
view.setUint16(offset,numChannels,true);offset+=2
view.setUint32(offset,sampleRate,true);offset+=4
view.setUint32(offset,sampleRate*numChannels*2,true);offset+=4
view.setUint16(offset,numChannels*2,true);offset+=2
view.setUint16(offset,16,true);offset+=2
writeString("data")
view.setUint32(offset,samples*2,true);offset+=4

for(let i=0;i<buffer.length;i++){

for(let ch=0;ch<numChannels;ch++){

let sample=buffer.getChannelData(ch)[i]

sample=Math.max(-1,Math.min(1,sample))

view.setInt16(offset,sample<0?sample*0x8000:sample*0x7FFF,true)

offset+=2

}

}

return arrayBuffer

}

</script>

</body>
</html>
